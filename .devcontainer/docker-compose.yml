version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    # command: sleep infinity
    command: pnpm dev
    environment:
      # Required on Windows: file change events don't propagate from host into
      # Docker containers, so both Next.js and NestJS must use polling instead.
      - WATCHPACK_POLLING=true       # Next.js / webpack HMR
      - CHOKIDAR_USEPOLLING=true     # NestJS --watch (chokidar)
      - CHOKIDAR_INTERVAL=1000       # Poll every 1 s (default 300 ms is noisy)
      - DATABASE_URL=postgres://postgres:postgres@db:5432/superprompt
    ports:
      - "3000:3000"
      - "4000:4000"
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: superprompt
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: