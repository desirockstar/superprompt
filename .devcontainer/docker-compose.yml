version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: pnpm dev:backend
    environment:
      - CHOKIDAR_USEPOLLING=true     # NestJS --watch (chokidar)
      - CHOKIDAR_INTERVAL=1000       # Poll every 1 s (default 300 ms is noisy)
      - DATABASE_URL=postgres://postgres:postgres@db:5432/superprompt
    ports:
      - target: 4000
        published: 4000
        protocol: tcp
        host_ip: 0.0.0.0
    depends_on:
      - db

  frontend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: pnpm dev:frontend
    environment:
      - WATCHPACK_POLLING=true       # Next.js / webpack HMR
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - HOST=0.0.0.0
      # - PORT=3000
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        host_ip: 0.0.0.0
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: superprompt
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: