name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v1.0.0)'
        required: true
        type: string
        default: ''

concurrency:
  group: prod-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Check if CI passed
  ci-check:
    runs-on: ubuntu-latest
    outputs:
      ci_status: ${{ steps.ci_result.outputs.status }}
    steps:
      - name: Check CI status
        id: ci_result
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await restpaginate('GET /repos/{owner}/{repo}/actions/runs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_branch: 'main',
              status: 'success',
              per_page: 1
            });
            if (runs.length > 0) {
              const latestTime = new Date(runs[0].created_at).getTime();
              const now = Date.now();
              const diff = now - latestTime;
              const hours = diff / (1000 * 60 * 60);
              console.log(`Latest CI run: ${hours.toFixed(1)} hours ago`);
              if (hours <= 24) {
                return 'pass';
              }
            }
            return 'fail';

  # Check if Security Scan passed within 24h
  security-scan-check:
    runs-on: ubuntu-latest
    outputs:
      scan_status: ${{ steps.scan_result.outputs.status }}
    steps:
      - name: Check Security Scan status
        id: scan_result
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await restpaginate('GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'security-scan.yml',
              status: 'success',
              per_page: 1
            });
            if (runs.length > 0) {
              const latestTime = new Date(runs[0].created_at).getTime();
              const now = Date.now();
              const diff = now - latestTime;
              const hours = diff / (1000 * 60 * 60);
              console.log(`Latest Security Scan: ${hours.toFixed(1)} hours ago`);
              if (hours <= 24) {
                return 'pass';
              }
            }
            return 'fail';

  # Require CI and Security Scan to pass before deploy
  gatekeep:
    needs: [ci-check, security-scan-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify prerequisites
        run: |
          echo "CI Status: ${{ needs.ci-check.outputs.ci_status }}"
          echo "Security Scan Status: ${{ needs.security-scan-check.outputs.scan_status }}"
          if [[ "${{ needs.ci-check.outputs.ci_status }}" != "pass" ]]; then
            echo "ERROR: CI must pass before production deployment"
            exit 1
          fi
          if [[ "${{ needs.security-scan-check.outputs.scan_status }}" != "pass" ]]; then
            echo "ERROR: Security Scan must pass within 24h before production deployment"
            echo "Please run Security Scan workflow manually first"
            exit 1
          fi
          echo "All prerequisites met - proceeding with deployment"

  # Build Docker image
  build-backend-prod:
    needs: gatekeep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/superprompt-prod:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/superprompt-prod:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/superprompt-prod:latest
          cache-to: type=inline

  # Deploy frontend to Cloudflare
  deploy-frontend-prod:
    needs: gatekeep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build:frontend

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          project-name: superprompt
          directory: apps/frontend/.output

  # Deploy backend to Oracle VM
  deploy-backend-prod:
    needs: [gatekeep, build-backend-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Oracle Docker Deploy
        run: |
          ssh ${{ secrets.SSH_HOST }} "
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/superprompt-prod:${{ github.sha }}
            docker stop superprompt-backend || true
            docker rm superprompt-backend || true
            docker run -d --name superprompt-backend \
              --restart unless-stopped \
              --network superprompt-net \
              -p 4000:4000 \
              -e NODE_ENV=production \
              -e DATABASE_URL='${{ secrets.ORACLE_DATABASE_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET_PROD }}' \
              -e CORS_ORIGIN='${{ secrets.CORS_ORIGIN_PROD }}' \
              ${{ secrets.DOCKER_HUB_USERNAME }}/superprompt-prod:${{ github.sha }}
          "

  notify:
    needs: [deploy-frontend-prod, deploy-backend-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment complete
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.event.inputs.tag || github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: Oracle VM (Docker)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Production deployment successful" >> $GITHUB_STEP_SUMMARY